<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vimal Kumar R — Cybersecurity Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --blue: #0066ff;
    --green: #00ff88;
    --red: #ff003c;
    --dark: #020813;
    --darker: #010510;
    --panel: rgba(0,20,50,0.6);
    --border: rgba(0,245,255,0.15);
    --glow: 0 0 20px rgba(0,245,255,0.4);
    --glow-strong: 0 0 40px rgba(0,245,255,0.7), 0 0 80px rgba(0,102,255,0.3);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: #c8e8ff;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed; width: 12px; height: 12px;
    background: var(--cyan); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    mix-blend-mode: screen;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, width 0.2s, height 0.2s;
    box-shadow: 0 0 15px var(--cyan), 0 0 30px rgba(0,245,255,0.5);
  }
  #cursor-ring {
    position: fixed; width: 36px; height: 36px;
    border: 1px solid rgba(0,245,255,0.5);
    border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
  }
  body:hover #cursor { transform: translate(-50%,-50%) scale(1.2); }

  /* CANVAS BACKGROUND */
  #bg-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }

  /* SCANLINES */
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none; z-index: 1; animation: scanmove 8s linear infinite;
  }
  @keyframes scanmove { from { background-position: 0 0; } to { background-position: 0 40px; } }

  /* VIGNETTE */
  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none; z-index: 1;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    padding: 16px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(1,5,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 40px rgba(0,245,255,0.05);
  }
  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-size: 18px; font-weight: 900;
    color: var(--cyan);
    letter-spacing: 4px;
    text-shadow: var(--glow);
  }
  .nav-logo span { color: var(--blue); }
  .nav-links { display: flex; gap: 36px; }
  .nav-links a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: rgba(200,232,255,0.6);
    text-decoration: none; letter-spacing: 2px;
    transition: color 0.3s, text-shadow 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px; background: var(--cyan);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--cyan); text-shadow: var(--glow); }
  .nav-links a:hover::after { width: 100%; }
  .nav-status {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--green);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* WRAPPER */
  .wrapper { position: relative; z-index: 2; }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 100px 48px 60px;
    position: relative; overflow: hidden;
  }

  .hero-grid-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridshift 20s linear infinite;
  }
  @keyframes gridshift {
    0% { transform: perspective(500px) rotateX(5deg) translateY(0); }
    100% { transform: perspective(500px) rotateX(5deg) translateY(60px); }
  }

  .hero-content {
    display: flex; flex-direction: column; align-items: flex-start;
    max-width: 900px; width: 100%;
  }

  .hero-tag {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--cyan); letter-spacing: 4px;
    border: 1px solid rgba(0,245,255,0.3);
    padding: 6px 16px; margin-bottom: 24px;
    background: rgba(0,245,255,0.05);
    animation: fadeSlideIn 0.8s ease both;
    position: relative;
  }
  .hero-tag::before {
    content: '▶'; margin-right: 8px; font-size: 8px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .hero-name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(44px, 7vw, 86px);
    font-weight: 900;
    line-height: 1; letter-spacing: -2px;
    color: #fff;
    text-shadow: 0 0 60px rgba(0,245,255,0.3), 0 0 120px rgba(0,102,255,0.2);
    animation: fadeSlideIn 0.8s 0.2s ease both;
    position: relative;
  }
  .hero-name .accent { color: var(--cyan); }

  .hero-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(14px, 2vw, 20px);
    color: var(--blue); letter-spacing: 6px;
    margin-top: 12px;
    animation: fadeSlideIn 0.8s 0.4s ease both;
  }

  .hero-desc {
    font-size: 17px; line-height: 1.7;
    color: rgba(200,232,255,0.65);
    max-width: 580px; margin-top: 24px;
    animation: fadeSlideIn 0.8s 0.6s ease both;
  }

  .hero-stats {
    display: flex; gap: 40px; margin-top: 40px;
    animation: fadeSlideIn 0.8s 0.8s ease both;
  }
  .stat-item { display: flex; flex-direction: column; }
  .stat-num {
    font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 900;
    color: var(--cyan); line-height: 1;
    text-shadow: var(--glow);
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: rgba(200,232,255,0.4); letter-spacing: 2px; margin-top: 4px;
  }

  .hero-btns {
    display: flex; gap: 16px; margin-top: 44px;
    animation: fadeSlideIn 0.8s 1s ease both;
  }
  .btn-primary {
    font-family: 'Orbitron', monospace; font-size: 12px;
    font-weight: 700; letter-spacing: 3px;
    padding: 14px 32px; background: var(--cyan); color: var(--dark);
    border: none; cursor: none; position: relative; overflow: hidden;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: transform 0.2s, box-shadow 0.3s;
  }
  .btn-primary::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,245,255,0.5); }
  .btn-primary:hover::before { transform: translateX(100%); }

  .btn-secondary {
    font-family: 'Orbitron', monospace; font-size: 12px;
    font-weight: 700; letter-spacing: 3px;
    padding: 14px 32px;
    background: transparent; color: var(--cyan);
    border: 1px solid rgba(0,245,255,0.4); cursor: none;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: all 0.3s;
  }
  .btn-secondary:hover { background: rgba(0,245,255,0.1); border-color: var(--cyan); box-shadow: var(--glow); }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HOLOGRAPHIC AVATAR */
  .hero-visual {
    position: absolute; right: 6%; top: 50%;
    transform: translateY(-50%);
    width: 340px; height: 340px;
    animation: fadeSlideIn 1s 0.5s ease both;
  }
  .avatar-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(0,245,255,0.2);
    animation: spin-ring 12s linear infinite;
  }
  .avatar-ring:nth-child(2) { inset: 20px; animation-duration: 8s; animation-direction: reverse; border-color: rgba(0,102,255,0.3); }
  .avatar-ring:nth-child(3) { inset: 40px; animation-duration: 15s; border-color: rgba(0,255,136,0.15); }
  @keyframes spin-ring { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .avatar-core {
    position: absolute; inset: 60px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(0,245,255,0.15), rgba(0,20,60,0.8));
    border: 1px solid rgba(0,245,255,0.3);
    box-shadow: inset 0 0 40px rgba(0,245,255,0.1), 0 0 60px rgba(0,245,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 11px;
    color: var(--cyan); letter-spacing: 2px;
    text-align: center;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { box-shadow: inset 0 0 40px rgba(0,245,255,0.1), 0 0 60px rgba(0,245,255,0.15); }
    50% { box-shadow: inset 0 0 60px rgba(0,245,255,0.2), 0 0 100px rgba(0,245,255,0.3); }
  }
  .avatar-dots {
    position: absolute; inset: 0;
    animation: spin-ring 20s linear infinite reverse;
  }
  .avatar-dot {
    position: absolute; width: 6px; height: 6px;
    background: var(--cyan); border-radius: 50%;
    top: 50%; left: 50%;
    box-shadow: 0 0 8px var(--cyan);
  }

  /* SECTIONS */
  section {
    padding: 100px 48px;
    max-width: 1200px; margin: 0 auto;
    position: relative;
  }

  .section-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 60px;
  }
  .section-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px; color: var(--cyan); opacity: 0.5;
  }
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 900; color: #fff;
    letter-spacing: 2px;
  }
  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(0,245,255,0.3), transparent);
  }

  /* EXPERIENCE */
  .timeline { position: relative; padding-left: 30px; }
  .timeline::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, var(--cyan), transparent);
  }
  .timeline-item {
    position: relative; margin-bottom: 48px;
    opacity: 0; transform: translateX(-20px);
    transition: opacity 0.6s, transform 0.6s;
  }
  .timeline-item.visible { opacity: 1; transform: translateX(0); }
  .timeline-dot {
    position: absolute; left: -34px; top: 6px;
    width: 8px; height: 8px; background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--cyan);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .exp-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px 32px;
    position: relative; overflow: hidden;
    backdrop-filter: blur(10px);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }
  .exp-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 1px; background: linear-gradient(90deg, var(--cyan), transparent);
  }
  .exp-card:hover {
    border-color: rgba(0,245,255,0.4); box-shadow: var(--glow);
    transform: translateX(6px);
  }
  .exp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .exp-role {
    font-family: 'Orbitron', monospace; font-size: 16px;
    font-weight: 700; color: #fff;
  }
  .exp-period {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--cyan); opacity: 0.7;
    border: 1px solid rgba(0,245,255,0.2); padding: 3px 10px;
  }
  .exp-company {
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    color: var(--blue); margin-bottom: 16px;
  }
  .exp-items { list-style: none; }
  .exp-items li {
    font-size: 15px; color: rgba(200,232,255,0.65);
    padding: 5px 0; padding-left: 20px; position: relative;
    line-height: 1.5;
  }
  .exp-items li::before {
    content: '›'; position: absolute; left: 0;
    color: var(--cyan); font-size: 18px; line-height: 1.2;
  }

  /* SKILLS */
  .skills-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .skill-category {
    background: var(--panel); border: 1px solid var(--border);
    padding: 24px; position: relative; overflow: hidden;
    backdrop-filter: blur(10px);
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s, border-color 0.3s, box-shadow 0.3s;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }
  .skill-category.visible { opacity: 1; transform: translateY(0); }
  .skill-category:hover { border-color: rgba(0,245,255,0.35); box-shadow: var(--glow); }
  .skill-category::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 40px; height: 40px;
    border-right: 1px solid rgba(0,245,255,0.2);
    border-bottom: 1px solid rgba(0,245,255,0.2);
  }
  .skill-cat-title {
    font-family: 'Orbitron', monospace; font-size: 11px;
    font-weight: 700; color: var(--cyan);
    letter-spacing: 3px; margin-bottom: 16px;
    text-transform: uppercase;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: rgba(200,232,255,0.8);
    border: 1px solid rgba(0,245,255,0.15);
    padding: 5px 12px;
    background: rgba(0,245,255,0.04);
    transition: all 0.3s;
    cursor: default;
  }
  .skill-tag:hover {
    background: rgba(0,245,255,0.12);
    border-color: rgba(0,245,255,0.5);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.2);
    transform: translateY(-2px);
  }

  /* PROJECTS */
  .projects-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }
  .project-card {
    background: var(--panel); border: 1px solid var(--border);
    padding: 28px; position: relative; overflow: hidden;
    backdrop-filter: blur(10px);
    opacity: 0; transform: scale(0.95);
    transition: opacity 0.5s, transform 0.5s, border-color 0.3s, box-shadow 0.3s;
    clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
  }
  .project-card.visible { opacity: 1; transform: scale(1); }
  .project-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.04), transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .project-card:hover::before { opacity: 1; }
  .project-card:hover { border-color: rgba(0,245,255,0.35); box-shadow: var(--glow); transform: translateY(-4px) scale(1.01); }
  .project-icon {
    font-size: 28px; margin-bottom: 16px;
    filter: drop-shadow(0 0 8px rgba(0,245,255,0.5));
  }
  .project-title {
    font-family: 'Orbitron', monospace; font-size: 14px;
    font-weight: 700; color: #fff; margin-bottom: 10px;
  }
  .project-desc { font-size: 14px; color: rgba(200,232,255,0.55); line-height: 1.6; }
  .project-tech { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .project-tech span {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--green); border: 1px solid rgba(0,255,136,0.2);
    padding: 3px 8px; background: rgba(0,255,136,0.05);
  }

  /* CERTS */
  .certs-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
  }
  .cert-card {
    background: var(--panel); border: 1px solid var(--border);
    padding: 24px; position: relative;
    backdrop-filter: blur(10px);
    display: flex; align-items: flex-start; gap: 16px;
    opacity: 0; transform: translateX(20px);
    transition: opacity 0.5s, transform 0.5s, border-color 0.3s, box-shadow 0.3s;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
  }
  .cert-card.visible { opacity: 1; transform: translateX(0); }
  .cert-card:hover { border-color: rgba(0,245,255,0.35); box-shadow: var(--glow); }
  .cert-badge {
    width: 48px; height: 48px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(0,102,255,0.3), rgba(0,245,255,0.1));
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
  }
  .cert-title {
    font-family: 'Orbitron', monospace; font-size: 13px;
    font-weight: 700; color: #fff; margin-bottom: 6px;
  }
  .cert-org {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--cyan); opacity: 0.7; margin-bottom: 4px;
  }
  .cert-id {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: rgba(200,232,255,0.3);
  }

  /* CONTACT */
  #contact { text-align: center; }
  .contact-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px; margin: 48px 0;
  }
  .contact-item {
    background: var(--panel); border: 1px solid var(--border);
    padding: 24px; backdrop-filter: blur(10px);
    transition: all 0.3s; text-decoration: none; color: inherit;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: none;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s, border-color 0.3s, box-shadow 0.3s;
  }
  .contact-item.visible { opacity: 1; transform: translateY(0); }
  .contact-item:hover { border-color: var(--cyan); box-shadow: var(--glow); }
  .contact-icon { font-size: 28px; filter: drop-shadow(0 0 8px rgba(0,245,255,0.5)); }
  .contact-label {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--cyan); letter-spacing: 2px;
  }
  .contact-value { font-size: 13px; color: rgba(200,232,255,0.7); word-break: break-all; }

  /* FOOTER */
  footer {
    text-align: center; padding: 40px;
    border-top: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: rgba(200,232,255,0.2); position: relative; z-index: 2;
  }
  footer span { color: var(--cyan); opacity: 0.6; }

  /* GLITCH EFFECT */
  .glitch {
    position: relative;
    animation: glitch-anim 5s infinite;
  }
  @keyframes glitch-anim {
    0%, 94%, 100% { clip-path: none; transform: none; }
    95% { clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%); transform: translateX(-4px); }
    96% { clip-path: polygon(0 50%, 100% 50%, 100% 65%, 0 65%); transform: translateX(4px); }
    97% { clip-path: polygon(0 70%, 100% 70%, 100% 80%, 0 80%); transform: translateX(-2px); }
    98% { clip-path: none; transform: none; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--darker); }
  ::-webkit-scrollbar-thumb { background: var(--cyan); opacity: 0.3; }

  /* TYPEWRITER */
  .typewriter-wrap { min-height: 30px; }
  #typewriter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px; color: var(--green);
    border-right: 2px solid var(--green);
    padding-right: 4px;
    animation: cursor-blink 0.8s step-end infinite;
  }
  @keyframes cursor-blink { 0%,100
